# DDSS - Dutch Detection & Suppression System
# "Niente olandese in questa casa!"

audio:
  device: null               # null = default USB mic, or integer device index
  chunk_seconds: 5           # seconds of audio per detection chunk
  sample_rate: 16000         # 16kHz required by Whisper

detection:
  model: "small"             # whisper model: tiny (fast/less accurate), base, small (recommended for Pi 5)
  language_threshold: 0.5    # minimum confidence (0.0-1.0) to trigger action
  target_language: "nl"      # ISO 639-1 code: nl=Dutch, de=German, fr=French, etc.
  cooldown_seconds: 30       # minimum seconds between triggers

hue:
  bridge_ip: "192.168.1.x"  # your Philips Hue bridge IP address
  lights:                    # light names to control (must match Hue app names)
    - "Kids Room"
  action: "flash_then_off"   # off | flash | flash_then_off | color_alert
  flash_color:               # color used for flash/color_alert (red by default)
    hue: 0                   # 0-65535 (0=red, 21845=green, 43690=blue)
    saturation: 254          # 0-254
    brightness: 254          # 0-254
  restore_after_seconds: 60  # restore previous light state after N seconds (0=don't restore)
